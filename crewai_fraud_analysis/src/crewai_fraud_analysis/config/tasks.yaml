fetch_hourly_workouts_task:
  description: >
    Fetch workout activities from Firestore. Use parameters like hours_back, user_id, 
    or activity_id as instructed by the Orchestrator. Always return the route_metrics if available.
  expected_output: >
    A list of workouts with their metrics (distance, speed, jumps).
  agent: workout_speed_analyst

analyze_workout_patterns_task:
  description: >
    Analyze specific workouts provided by the Orchestrator. 
    1. Check for superhuman speed. 
    2. Identify GPS jumps. 
    Only perform analysis on the data provided, do not fetch new data.
  expected_output: >
    Technical findings flagging suspicious behavior with evidence.
  agent: spatial_integrity_auditor

generate_fraud_report_task:
  description: >
    Consolidate technical findings into a human-readable report in Spanish.
    Format specifically for Telegram. Re-evaluate if the findings actually constitute fraud.
  expected_output: >
    A clear report in Spanish Markdown.
  agent: fraud_reporting_officer

handle_user_request_task:
  description: >
    Process the user message: "{user_input}".
    1. If it's a greeting or general talk, answer directly as a friendly assistant.
    2. If the user asks for analysis ("¿Hay fraudes?", "Analiza el día", etc.), 
       use the Firestore search tool to find data and delegate to specialists if needed.
    3. Be concise and natural.
  expected_output: >
    A natural and helpful response in Spanish.
  agent: adventure_streak_orchestrator
